name: bjjapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.0+7

environment:
  sdk: '>=3.4.0 <4.0.0' # Atualizado para a versão mais recente do Flutter

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.1.1 
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.4.0 # Adicione esta linha
  url_launcher: ^6.2.6 
  in_app_update: 4.2.3 # Use a versão mais atual
  firebase_remote_config: ^5.0.0 
  package_info_plus: ^8.0.0

  image_picker: ^1.1.2    # <-- ADICIONE/ATUALIZE ESTA
  path: ^1.9.0            # <-- ADICIONE/ATUALIZE ESTA
  
  # Ícones e Utilitários
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  collection: ^1.18.0
  intl: ^0.20.2  # VERSÃO CORRIGIDA

  # Calendário
  table_calendar: ^3.1.0

  # Backup e Restauração
  file_picker: ^8.0.0+1      # ADICIONADO
  path_provider: ^2.1.3   # ADICIONADO
  permission_handler: ^11.3.1 # ADICIONADO
  share_plus: ^9.0.0
  firebase_messaging: ^15.1.0
  firebase_storage: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/faixas/

# Bloco de configuração para o ÍCONE
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icone.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#212f28"
  adaptive_icon_foreground: "assets/images/icone.png"


# Bloco de configuração para a SPLASH SCREEN
flutter_native_splash:
  color: "#212f28"
  image: assets/images/splash_fundo.png
  android: true
  ios: true