name: bjjapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.2.11+34

environment:
  sdk: '>=3.4.0 <4.0.0' # Atualizado para a versão mais recente do Flutter

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.0.0 
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0 # Adicione esta linha
  url_launcher: ^6.2.6 
  in_app_update: 4.2.3 # Use a versão mais atual
  firebase_remote_config: ^6.0.0 
  package_info_plus: ^8.0.0
  shimmer: ^3.0.0 
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  fl_chart: ^1.1.0 

  image_picker: ^1.1.2    # <-- ADICIONE/ATUALIZE ESTA
  path: ^1.9.0            # <-- ADICIONE/ATUALIZE ESTA
  
  # Ícones e Utilitários
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  collection: ^1.18.0
  intl: ^0.20.2  # VERSÃO CORRIGIDA

  # Calendário
  table_calendar: ^3.1.0

  # Backup e Restauração
  file_picker: ^10.2.1      # ADICIONADO
  path_provider: ^2.1.3   # ADICIONADO
  permission_handler: ^12.0.1 # ADICIONADO
  share_plus: ^11.0.0
  firebase_messaging: ^16.0.1
  firebase_storage: ^13.0.0
  timeline_tile: ^2.0.0
  video_player: ^2.10.0
  flutter_staggered_grid_view: ^0.7.0
  chewie: ^1.12.1
  video_compress: ^3.1.4
  firebase_in_app_messaging: ^0.9.0+1
  syncfusion_flutter_charts: ^31.1.19
  audioplayers: ^6.5.1
  vector_math: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/faixas/
    - assets/images/golpes_proibidos/

# Bloco de configuração para o ÍCONE
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icone.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A0F14"
  adaptive_icon_foreground: "assets/images/icone.png"


# Bloco de configuração para a SPLASH SCREEN
flutter_native_splash:
  # Configurações gerais que se aplicam a todos (Android, iOS, Web)
  color: "#0A0F14"
  image: assets/images/icone.png

  # Habilita a geração para Android e iOS
  android: true
  ios: true
  
  # Habilita a geração para Web
  web: true

  # Parâmetros específicos para Web
  web_image_mode: center